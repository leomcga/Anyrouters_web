<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Single site on anyrouters.com: bounce the legacy console subdomain to
         the apex before anything else loads (no flash). Stripe/OIDC server
         callbacks are unaffected — this only runs in the browser. -->
    <script>
      (function () {
        if (location.hostname === 'console.anyrouters.com') {
          location.replace(
            'https://anyrouters.com' +
              location.pathname +
              location.search +
              location.hash
          )
        }
      })()
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a1a1f'/%3E%3Cpath d='M9 22 16 9l7 13' fill='none' stroke='white' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <!-- Safari ignores SVG favicons → fall back to the brand .ico (the ?v= busts
         the heavily-cached old favicon). -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>AnyRouters — 一个 API，调用所有前沿大模型</title>
    <meta name="title" content="AnyRouters" />
    <meta
      name="description"
      content="一站式接入 ChatGPT、Gemini、Claude 全系列。官方上游直连，一把密钥，一份账单。"
    />

    <meta name="theme-color" content="#fff" />
    <!--umami-->
    <!--Google Analytics-->
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
