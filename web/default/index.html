<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Single site on anyrouters.com: bounce the legacy console subdomain to
         the apex before anything else loads (no flash). Stripe/OIDC server
         callbacks are unaffected — this only runs in the browser. -->
    <script>
      ;(function () {
        if (location.hostname === 'console.anyrouters.com') {
          location.replace(
            'https://anyrouters.com' +
              location.pathname +
              location.search +
              location.hash
          )
        }
      })()
    </script>
    <link rel="icon" href="/favicon.ico?v=3" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>AnyRouters — 一个 API，调用所有前沿大模型</title>
    <meta name="title" content="AnyRouters" />
    <meta
      name="description"
      content="一站式接入 ChatGPT、Gemini、Claude 全系列。官方上游直连，一把密钥，一份账单。"
    />

    <meta name="theme-color" content="#fff" />
    <!--umami-->
    <!--Google Analytics-->
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
